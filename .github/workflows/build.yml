name: Build Wolf Gps dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        set -e
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos $THEOS -q
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Link iOS SDK from Xcode
      run: |
        set -e
        # الحصول على مسار SDK الحقيقي من Xcode
        REAL_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version)
        echo "✅ Xcode SDK: $REAL_SDK (v$SDK_VER)"
        
        # إنشاء رابط بالاسم الذي يتوقعه Theos
        mkdir -p $HOME/theos/sdks
        ln -sf "$REAL_SDK" "$HOME/theos/sdks/iPhoneOS${SDK_VER}.sdk"
        
        # تحديث Makefile ليستخدم الإصدار الصحيح
        sed -i '' "s/TARGET := iphone:clang:[0-9.]*/TARGET := iphone:clang:${SDK_VER}/" Makefile 2>/dev/null || true
        
        echo "SDK_VERSION=$SDK_VER" >> $GITHUB_ENV
        echo "SDKs المتاحة: $(ls $HOME/theos/sdks/)"

    - name: Build package
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        echo "SDK المتاح: $(ls $THEOS/sdks/)"
        make package FINALPACKAGE=1 2>&1
        echo "---"
        echo "الملفات المبنية:"
        find . -name "*.dylib" -o -name "*.deb" 2>/dev/null | head -10

    - name: Upload Build Output
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: WolfGps-v3.4-Build
        path: |
          packages/
          .theos/obj/**/*.dylib
        retention-days: 30
        if-no-files-found: warn
