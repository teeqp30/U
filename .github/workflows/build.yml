name: Build Wolf Gps dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        set -e
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos $THEOS -q
        
    - name: Download iOS SDK
      run: |
        set -e
        export THEOS=~/theos
        mkdir -p $THEOS/sdks
        
        # استخدام Xcode SDK المثبت مسبقاً على macOS-14
        XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || true)
        if [ -n "$XCODE_SDK" ]; then
          SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null)
          echo "✅ استخدام Xcode SDK: $XCODE_SDK (v$SDK_VER)"
          ln -sf "$XCODE_SDK" "$THEOS/sdks/iPhoneOS${SDK_VER}.sdk"
          echo "SDK_VERSION=$SDK_VER" >> $GITHUB_ENV
        else
          echo "❌ Xcode SDK غير متاح"
          exit 1
        fi
        echo "SDKs: $(ls $THEOS/sdks/)"

    - name: Build dylib
      run: |
        export THEOS=~/theos
        export PATH=$THEOS/bin:$PATH
        export TARGET="iphone:clang:${SDK_VERSION:-17.0}:14.0"
        echo "Building with TARGET=$TARGET"
        make package FINALPACKAGE=1 2>&1
        echo "✅ Build complete"
        ls -la packages/ || echo "لا يوجد مجلد packages"
        find . -name "*.dylib" -o -name "*.deb" | head -10

    - name: Upload dylib artifact
      uses: actions/upload-artifact@v4
      with:
        name: WolfGps-dylib
        path: |
          packages/*.deb
          .theos/obj/**/*.dylib
        retention-days: 30

    - name: Upload deb artifact  
      uses: actions/upload-artifact@v4
      with:
        name: WolfGps-deb
        path: packages/
        retention-days: 30
