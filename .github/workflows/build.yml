name: Build Wolf Gps dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        set -e
        export THEOS=$HOME/theos
        git clone --recursive https://github.com/theos/theos $THEOS -q
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Download Theos iOS SDK (16.5)
      run: |
        set -e
        mkdir -p $HOME/theos/sdks
        # تحميل SDK المخصص لـ Theos من مستودعه الرسمي
        curl -L https://github.com/theos/sdks/releases/download/2024-06-06/iPhoneOS16.5.sdk.tar.xz \
          -o /tmp/sdk.tar.xz \
          --retry 5 \
          --retry-delay 5 \
          --connect-timeout 30 \
          --max-time 300 \
          -f \
          --show-error
        tar -xJf /tmp/sdk.tar.xz -C $HOME/theos/sdks/
        echo "✅ SDK installed: $(ls $HOME/theos/sdks/)"

    - name: Build package
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        make package FINALPACKAGE=1 2>&1
        echo "---"
        echo "الملفات المبنية:"
        find . -name "*.dylib" -o -name "*.deb" 2>/dev/null | head -10

    - name: Upload Build Output
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: WolfGps-v3.4-Build
        path: |
          packages/
          .theos/obj/**/*.dylib
        retention-days: 30
        if-no-files-found: warn
