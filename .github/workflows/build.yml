name: Build Wolf Gps dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        set -e
        export THEOS=$HOME/theos
        git clone --recursive https://github.com/theos/theos $THEOS -q
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Link Xcode iOS SDK into Theos
      run: |
        set -e
        # الحصول على SDK الحقيقي من Xcode (مثبت مسبقاً على macOS-14)
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version)
        echo "✅ Xcode SDK: $SDK_PATH"
        echo "✅ SDK Version: $SDK_VER"
        
        mkdir -p $HOME/theos/sdks
        
        # نسخ SDK بالكامل (وليس رابط رمزي) لضمان عمل Theos
        cp -r "$SDK_PATH" "$HOME/theos/sdks/iPhoneOS${SDK_VER}.sdk"
        
        echo "SDK_VER=$SDK_VER" >> $GITHUB_ENV
        ls $HOME/theos/sdks/

    - name: Update Makefile SDK version
      run: |
        # تحديث إصدار SDK في Makefile
        sed -i '' "s/TARGET = iphone:clang:[^:]*/TARGET = iphone:clang:${SDK_VER}/" Makefile
        echo "Makefile TARGET:"
        grep TARGET Makefile

    - name: Build package
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        make package FINALPACKAGE=1 2>&1
        echo "---"
        echo "الملفات المبنية:"
        find . -name "*.dylib" -o -name "*.deb" 2>/dev/null | head -10

    - name: Upload Build Output
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: WolfGps-v3.4-Build
        path: |
          packages/
          .theos/obj/**/*.dylib
        retention-days: 30
        if-no-files-found: warn
